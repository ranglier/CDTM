name: CDTM CI

on:
  workflow_dispatch:
  push:
    paths:
      - "cdtm-map/**"
      - ".forgejo/workflows/cdtm-ci.yml"

jobs:
  cdtm-map-ci:
    name: cdtm-map baseline
    runs-on: node20
    defaults:
      run:
        shell: sh
        working-directory: cdtm-map
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          set -eu
          echo "=== Runner ==="
          hostname || true
          whoami || true
          node --version
          npm --version
          echo "=== Workspace ==="
          pwd
          ls -la

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate:data

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
