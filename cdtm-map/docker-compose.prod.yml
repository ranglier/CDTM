services:
  cdtm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdtm-app
    restart: unless-stopped
    environment:
      APP_ENV: "${APP_ENV:-production}"
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-CDTM Map}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_SESSION_TTL_HOURS: "${ADMIN_SESSION_TTL_HOURS:-168}"
      UPLOADS_DIR: "${UPLOADS_DIR:-/app/uploads}"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cdtm_uploads:/app/uploads
    networks:
      - cdtm_internal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgis/postgis:17-3.5
    container_name: cdtm-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cdtm}"
      POSTGRES_USER: "${POSTGRES_USER:-cdtm}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - cdtm_postgis_data:/var/lib/postgresql/data
    networks:
      - cdtm_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdtm} -d ${POSTGRES_DB:-cdtm}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cdtm_postgis_data:
  cdtm_uploads:

networks:
  cdtm_internal:
    driver: bridge
